# HexBlock dnsmasq configuration
# The upstream DNS server is set by the setup script.
# Do not edit this file directly — re-run scripts/setup.sh instead.

# Do not read /etc/resolv.conf
no-resolv

# Upstream DNS — updated by setup.sh
server=1.1.1.1
server=1.0.0.1

# Listen on all interfaces inside the container
listen-address=0.0.0.0
bind-interfaces

# Do not forward plain names (no dots)
domain-needed

# Never forward addresses in non-routed spaces
bogus-priv

# DNS cache size
cache-size=10000

# Negative caching TTL
neg-ttl=60

# Load generated blocklist and local host overrides
# Files are written by the HexBlock app and the setup script.
# dnsmasq.d is volume-mounted — persists across container restarts.
conf-dir=/etc/dnsmasq.d,*.conf,*.hosts

# Log queries to stdout (picked up by Docker logging)
log-queries
log-facility=-
