version: "3.9"

services:

  # ── Main application ──────────────────────────────────────
  # No ports are exposed here by default.
  # The setup script writes docker-compose.override.yml which adds
  # a host port binding only for HTTP-only (local network) deployments.
  # Proxy deployments (Traefik, Caddy, Nginx, Cloudflare Tunnel) reach
  # HexBlock on the internal Docker network — no host port needed.
  hexblock:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: hexblock
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./data/db:/data/db
      - ./data/blocklists:/data/blocklists
      - ./data/logs:/data/logs
      - ./wireguard:/etc/wireguard:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/hexblock-display:/opt/hexblock-display:ro
      - /sys/class/thermal:/sys/class/thermal:ro
      - /etc/dnsmasq.d:/etc/dnsmasq.d
      - /usr/local/bin/hexblock-reload-dns:/usr/local/bin/hexblock-reload-dns:ro
      - /proc:/host/proc:ro
      - /var/log/dnsmasq.log:/var/log/dnsmasq.log:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /usr/local/bin/hexblock-reload-dns:/usr/local/bin/hexblock-reload-dns:ro
      - /run/systemd/private:/run/systemd/private:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    environment:
      - HEXBLOCK_ENV=production
      - DB_PATH=/data/db/hexblock.db
      - BLOCKLIST_DIR=/data/blocklists
      - LOG_DIR=/data/logs
    env_file:
      - path: .env
        required: false
    dns:
      - 1.1.1.1
      - 1.0.0.1
    security_opt:
      - no-new-privileges:true
    group_add:
      - "108"
    networks:
      - hexblock-net


  # ── WireGuard VPN ─────────────────────────────────────────
  # Port 51820 UDP must be reachable from outside for VPN clients.
  # If you are not using the VPN, the setup script disables this
  # service via a Docker Compose profile so it does not start.
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: hexblock-wireguard
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - SERVERURL=auto
      - SERVERPORT=51820
      - PEERS=0
      - PEERDNS=hexblock-dns
      - INTERNAL_SUBNET=10.13.13.0
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - hexblock-net

volumes:
  # Shared between dns and hexblock containers.
  # The hexblock app writes blocklist and host files here.
  # dnsmasq reads them and reloads on SIGHUP without a restart.
  dnsmasq_d:

networks:
  hexblock-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
