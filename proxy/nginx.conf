# HexBlock — Nginx reverse proxy configuration
#
# Place this file at /etc/nginx/sites-available/hexblock
# then: sudo ln -s /etc/nginx/sites-available/hexblock /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Nginx installed
#   - SSL certificate (certbot recommended: sudo certbot --nginx -d hexblock.example.com)
#   - HexBlock running on localhost:8080
#
# .env settings required:
#   TRUST_PROXY=1
#   ALLOWED_HOSTS=hexblock.example.com

# ── HTTP — redirect to HTTPS ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hexblock.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hexblock.example.com;

    # SSL — replace with your certificate paths
    # (certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/hexblock.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexblock.example.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Proxy to HexBlock
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Required headers for HexBlock reverse proxy support
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket support (for live log streaming)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Buffer settings
        proxy_buffering    off;
        proxy_buffer_size  4k;
    }

    # Deny access to sensitive paths
    location ~ /\. {
        deny all;
    }
}


# ── Sub-path deployment (optional) ───────────────────────────
# Use this block instead if you want HexBlock at /hexblock on an existing domain.
# Also set ROOT_PATH=/hexblock in .env
