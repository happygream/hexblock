<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}HexBlock{% endblock %} — Privacy Gateway</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ request.app.url_path_for('static', path='css/hexblock.css') }}">
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script src="{{ request.app.url_path_for('static', path='js/i18n.js') }}"></script>
<script src="{{ request.app.url_path_for('static', path='js/hexblock.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
